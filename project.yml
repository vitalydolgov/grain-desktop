name: GrainApp

include:
  - path: local.yml
    required: false

options:
  bundleIdPrefix: com.github.vitalydolgov
  deploymentTarget:
    macOS: "15.0"
    watchOS: "11.0"
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  Grain:
    url: https://github.com/vitalydolgov/grain
    revision: 2522aa108efe34cb81c6ef568c4ad4d54db7a284

targets:
  GrainComponents:
    type: framework
    supportedDestinations: [macOS, watchOS, iOS]
    sources:
      - Sources/Components
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
    settings:
      base:
        SWIFT_VERSION: "6"
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.GrainComponents
        GENERATE_INFOPLIST_FILE: YES
        MACH_O_TYPE: staticlib

  Desktop:
    type: application
    platform: macOS
    sources:
      - Sources/Desktop
      - path: Sources/Shared
        excludes:
          - "**/*.txt"
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
      - target: GrainComponents
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Grain notifies you when a timer phase or session completes."
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Grain
    info:
      path: Sources/Desktop/Info.plist
      properties:
        ATSApplicationFontsPath: .

  Watch:
    type: application
    platform: watchOS
    sources:
      - Sources/Watch
      - path: Sources/Shared
        excludes:
          - "**/*.txt"
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
      - target: GrainComponents
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain.watchkitapp
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Watch/Info.plist
      properties:
        WKApplication: YES
        WKCompanionAppBundleIdentifier: com.github.vitalydolgov.Grain
        WKBackgroundModes:
          - self-care
        UIAppFonts:
          - Urbanist-VariableFont_wght.ttf
          - SUSEMono-VariableFont_wght.ttf

  Phone:
    type: application
    platform: iOS
    sources:
      - Sources/Phone
      - path: Sources/Shared
        excludes:
          - "**/*.txt"
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
      - target: GrainComponents
      - target: Watch
        embed: true
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Phone/Info.plist
      properties:
        UILaunchScreen: {}
        UIAppFonts:
          - Urbanist-VariableFont_wght.ttf
          - SUSEMono-VariableFont_wght.ttf
        CFBundleDisplayName: Grain
