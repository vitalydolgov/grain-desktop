name: GrainDesktop

options:
  bundleIdPrefix: com.github.vitalydolgov
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  Grain:
    url: https://github.com/vitalydolgov/grain
    revision: 43317fa25f8bec05889cadde712bc6c84e947e1a

targets:
  GrainDesktop:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Grain notifies you when a timer phase or session completes."
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Grain
