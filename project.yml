name: GrainApp

include:
  - path: local.yml
    required: false

options:
  bundleIdPrefix: com.github.vitalydolgov
  deploymentTarget:
    macOS: "14.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  Grain:
    url: https://github.com/vitalydolgov/grain
    revision: 3a3a07434e67fb294d4ee47cd015a471b5e99545

targets:
  GrainDesktop:
    type: application
    platform: macOS
    sources:
      - Sources/Desktop
      - Sources/Shared
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Grain notifies you when a timer phase or session completes."
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Grain
        INFOPLIST_KEY_ATSApplicationFontsPath: Fonts
    entitlements:
      path: Sources/Desktop/GrainDesktop.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.github.vitalydolgov.Grain

  GrainWatch:
    type: application
    platform: watchOS
    sources:
      - Sources/Watch
      - Sources/Shared
    dependencies:
      - package: Grain
        product: GrainDomain
      - package: Grain
        product: GrainApplication
    settings:
      base:
        PRODUCT_NAME: Grain
        PRODUCT_BUNDLE_IDENTIFIER: com.github.vitalydolgov.Grain.watchkitapp
        SWIFT_VERSION: "6"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: Grain
        WKApplication: YES
        WKWatchOnly: YES
        WKBackgroundModes:
          - self-care
        UIAppFonts:
          - Urbanist-VariableFont_wght.ttf
          - SUSEMono-VariableFont_wght.ttf
    entitlements:
      path: Sources/Watch/GrainWatch.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.github.vitalydolgov.Grain
        com.apple.developer.watchkit.background-modes:
          - self-care
