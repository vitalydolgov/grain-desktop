name: CI

on:
  push:
    branches: ["claude/**"]
    paths:
      - "Sources/**"
      - "project.yml"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project GrainApp.xcodeproj \
            -scheme GrainDesktop \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            -skipMacroValidation \
            | xcbeautify --quiet

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project GrainApp.xcodeproj \
            -scheme GrainPhone \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            -skipMacroValidation \
            | xcbeautify --quiet

      - name: Build watchOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project GrainApp.xcodeproj \
            -scheme GrainWatch \
            -destination "generic/platform=watchOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            -skipMacroValidation \
            | xcbeautify --quiet
